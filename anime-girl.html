<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura — Codify Vibeathon 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(160deg, #eaf2fb 0%, #dce8f5 50%, #c8d8ec 100%);
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; }
        #nav {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            display: flex; align-items: center; gap: 10px;
        }
        #nav a { color: rgba(60,40,80,0.55); text-decoration: none; font-size: 0.82rem; letter-spacing: 2px; transition: color 0.2s; }
        #nav a:hover { color: #C04060; }
        #nav span { color: rgba(60,40,80,0.25); font-size: 0.8rem; }
        #title {
            position: fixed; top: 16px; right: 22px; z-index: 100;
            font-size: 1.35rem; font-weight: 700; letter-spacing: 4px;
            background: linear-gradient(135deg, #E8809A, #C04060);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #hint {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 100;
        }
        #hint span {
            color: rgba(40,20,60,0.4); font-size: 0.72rem; letter-spacing: 1.5px;
            padding: 4px 10px; border: 1px solid rgba(180,80,120,0.2);
            border-radius: 20px; background: rgba(255,255,255,0.45);
            backdrop-filter: blur(6px); white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="nav">
        <a href="/">← Home</a>
        <span>/</span>
        <span style="color:rgba(180,60,100,0.7);font-size:0.82rem;letter-spacing:2px">SAKURA</span>
    </div>
    <div id="title">SAKURA</div>
    <div id="hint">
        <span>🖱 Move: Look</span>
        <span>✋ Click: Wave</span>
        <span>🔍 Scroll: Zoom</span>
    </div>

    <script src="three.min.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════
    //  SCENE / CAMERA / RENDERER
    // ═══════════════════════════════════════════════════════
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.01, 100);
    camera.position.set(0, 1.68, 4.0);
    camera.lookAt(0, 1.45, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ═══════════════════════════════════════════════════════
    //  LIGHTING  (warm classroom / window light)
    // ═══════════════════════════════════════════════════════
    scene.add(new THREE.AmbientLight(0xfff4ec, 0.65));

    const sun = new THREE.DirectionalLight(0xfff8e0, 1.1);
    sun.position.set(2.8, 6, 3.8);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.top = 4; sun.shadow.camera.bottom = -2;
    sun.shadow.camera.left = -4; sun.shadow.camera.right = 4;
    sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 20;
    scene.add(sun);

    const rim = new THREE.DirectionalLight(0xb0ccff, 0.42);
    rim.position.set(-2.5, 3, -2.5);
    scene.add(rim);

    const fill = new THREE.PointLight(0xffd0e8, 0.55, 8);
    fill.position.set(0, 1.9, 3.5);
    scene.add(fill);

    // ═══════════════════════════════════════════════════════
    //  TOON GRADIENT MAP  (3-step cell shading)
    // ═══════════════════════════════════════════════════════
    const gradMap = (() => {
        const t = new THREE.DataTexture(new Uint8Array([70, 145, 225]), 3, 1, THREE.LuminanceFormat);
        t.minFilter = t.magFilter = THREE.NearestFilter;
        t.needsUpdate = true;
        return t;
    })();

    // ═══════════════════════════════════════════════════════
    //  MATERIALS
    // ═══════════════════════════════════════════════════════
    const T  = (c, e={}) => new THREE.MeshToonMaterial({ color: c, gradientMap: gradMap, ...e });
    const B  = (c, e={}) => new THREE.MeshBasicMaterial({ color: c, ...e });
    // Face-feature materials always render on top (no z-fighting with head sphere)
    const BF = (c, e={}) => new THREE.MeshBasicMaterial({ color: c, depthTest: false, ...e });
    const ML = (c)       => new THREE.MeshLambertMaterial({ color: c });

    const MAT = {
        skin:     T(0xF7CDAB),
        hair:     T(0xC85878),
        hairHi:   T(0xDA7090),
        earIn:    T(0xFFB2CA),
        white:    T(0xF4F2EE),
        vest:     T(0x26263A),
        vestDk:   T(0x1C1C2C),
        bow:      T(0xBF2E58),
        skirt:    T(0x1A1A2A),
        sock:     T(0xECEAE4),
        shoe:     T(0x191926),
        fur:      T(0xFFFFFF),
        eye:      BF(0x76172E),
        pupil:    BF(0x140810),
        eyeWh:    BF(0xFFFFFF),
        lash:     BF(0x1C0810),
        brow:     BF(0x6C0E26),
        lip:      BF(0xBF5870),
        teeth:    BF(0xFFFCF8),
        blush:    BF(0xFF9090, { transparent: true, opacity: 0.18 }),
        nose:     BF(0xE0A090),
        floor:    ML(0xC6AA84),
        wall:     ML(0xE0D8CE),
        board:    ML(0x52806A),
        wood:     ML(0xA08050),
        winGlow:  B(0xFFF8E8, { transparent: true, opacity: 0.88 }),
    };

    // ═══════════════════════════════════════════════════════
    //  GEOMETRY / MESH HELPERS
    // ═══════════════════════════════════════════════════════
    function mk(geo, mat) {
        const m = new THREE.Mesh(geo, mat);
        m.castShadow = m.receiveShadow = true;
        return m;
    }
    const sph  = (r, ws=20, hs=20)       => new THREE.SphereGeometry(r, ws, hs);
    const box  = (w, h, d)               => new THREE.BoxGeometry(w, h, d, 2, 2, 2);
    const cyl  = (rt, rb, h, s=14)       => new THREE.CylinderGeometry(rt, rb, h, s);
    const cone = (r, h, s=6)             => new THREE.ConeGeometry(r, h, s);
    const circ = (r, s=22)               => new THREE.CircleGeometry(r, s);
    const ring = (ri, ro, s=24)          => new THREE.RingGeometry(ri, ro, s);

    // ═══════════════════════════════════════════════════════
    //  CLASSROOM ENVIRONMENT
    // ═══════════════════════════════════════════════════════
    // Floor
    const floor = mk(new THREE.PlaneGeometry(14, 14), MAT.floor);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Back wall
    const backWall = mk(new THREE.PlaneGeometry(12, 6), MAT.wall);
    backWall.position.set(0, 2.5, -4.5);
    scene.add(backWall);

    // Chalkboard
    const board = mk(box(3.8, 2.1, 0.07), MAT.board);
    board.position.set(-0.5, 2.3, -4.43);
    scene.add(board);
    const boardFrm = mk(box(4.0, 2.3, 0.05), MAT.wood);
    boardFrm.position.set(-0.5, 2.3, -4.45);
    scene.add(boardFrm);

    // Window (right side)
    const winPane = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 2.8), MAT.winGlow);
    winPane.position.set(4.7, 2.3, -0.8);
    winPane.rotation.y = -Math.PI / 2;
    scene.add(winPane);
    const winFrm = mk(box(0.06, 2.9, 2.3), MAT.wall);
    winFrm.position.set(4.68, 2.3, -0.8);
    scene.add(winFrm);

    // Desks
    function addDesk(x, z) {
        const g = new THREE.Group();
        const top = mk(box(0.88, 0.05, 0.6), MAT.wood);
        top.position.y = 0.75;
        g.add(top);
        [[-0.37, -0.22], [-0.37, 0.22], [0.37, -0.22], [0.37, 0.22]].forEach(([lx, lz]) => {
            const leg = mk(cyl(0.024, 0.024, 0.74, 6), MAT.vestDk);
            leg.position.set(lx, 0.375, lz);
            g.add(leg);
        });
        g.position.set(x, 0, z);
        scene.add(g);
    }
    addDesk(-2.4, 0.2); addDesk(-2.4, 1.6);
    addDesk( 2.4, 0.2); addDesk( 2.4, 1.6);

    // ═══════════════════════════════════════════════════════
    //  CHARACTER ROOT
    // ═══════════════════════════════════════════════════════
    const character = new THREE.Group();
    scene.add(character);

    // ── HIPS (center of mass, y = 0.96) ──────────────────
    const hipsGrp = new THREE.Group();
    hipsGrp.position.y = 0.96;
    character.add(hipsGrp);

    // ── TORSO ─────────────────────────────────────────────
    const torsoGrp = new THREE.Group();
    torsoGrp.position.y = 0.38;
    hipsGrp.add(torsoGrp);

    // White shirt (visible at collar/sleeve)
    const shirtLo = mk(box(0.50, 0.22, 0.28), MAT.white); shirtLo.position.y = -0.15; torsoGrp.add(shirtLo);
    const shirtHi = mk(box(0.56, 0.46, 0.30), MAT.white); shirtHi.position.y = 0.09; torsoGrp.add(shirtHi);

    // Dark vest overlay — pushed clearly in front of the shirt (z=0.06 → front=0.18 > shirt front=0.14)
    const vestBody = mk(box(0.54, 0.62, 0.24), MAT.vest); vestBody.position.z = 0.06; torsoGrp.add(vestBody);
    const vestTrim = mk(box(0.54, 0.035, 0.24), MAT.vestDk); vestTrim.position.set(0, -0.325, 0.06); torsoGrp.add(vestTrim);

    // Collar
    const collar = mk(cyl(0.1, 0.1, 0.08, 12), MAT.white); collar.position.y = 0.35; torsoGrp.add(collar);
    [[-1, 0.22], [1, -0.22]].forEach(([s, rz]) => {
        const w = mk(box(0.1, 0.13, 0.06), MAT.white);
        w.position.set(s * 0.078, 0.30, 0.148); w.rotation.z = rz * 0.28;
        torsoGrp.add(w);
    });

    // Bow tie
    const bowGrp = new THREE.Group(); bowGrp.position.set(0, 0.265, 0.162); torsoGrp.add(bowGrp);
    [-1, 1].forEach(s => {
        const bw = mk(box(0.105, 0.058, 0.038), MAT.bow);
        bw.position.x = s * 0.068; bw.rotation.z = s * 0.28;
        bowGrp.add(bw);
    });
    const bowKnot = mk(sph(0.036, 8, 8), MAT.bow); bowKnot.scale.set(1, 0.72, 0.65); bowGrp.add(bowKnot);

    // Vest buttons (4) — on vest front surface
    for (let i = 0; i < 4; i++) {
        const btn = mk(sph(0.016, 7, 7), MAT.vestDk);
        btn.position.set(0, 0.14 - i * 0.115, 0.188); torsoGrp.add(btn);
    }

    // Pocket — on vest front surface
    const pocket = mk(box(0.102, 0.062, 0.012), MAT.white); pocket.position.set(0.175, 0.175, 0.188); torsoGrp.add(pocket);

    // ── ARMS ──────────────────────────────────────────────
    const SY = 0.30, SX = 0.325; // shoulder attach

    function makeArm(side) {
        const shoulderGrp = new THREE.Group();
        shoulderGrp.position.set(side * SX, SY, 0);
        torsoGrp.add(shoulderGrp);

        const upperGrp = new THREE.Group();
        shoulderGrp.add(upperGrp);
        const ua = mk(cyl(0.078, 0.066, 0.41, 10), MAT.white); ua.position.y = -0.205; upperGrp.add(ua);

        const elbowGrp = new THREE.Group(); elbowGrp.position.y = -0.41; upperGrp.add(elbowGrp);
        const la = mk(cyl(0.066, 0.056, 0.37, 10), MAT.white); la.position.y = -0.185; elbowGrp.add(la);

        const hand = mk(sph(0.074, 14, 14), MAT.skin); hand.scale.set(1, 0.87, 0.9); hand.position.y = -0.38; elbowGrp.add(hand);
        // finger nubs
        for (let f = 0; f < 4; f++) {
            const fn = mk(sph(0.019, 6, 6), MAT.skin);
            fn.scale.set(0.6, 1.35, 0.6); fn.position.set(-0.026 + f * 0.017, -0.448, 0.03);
            elbowGrp.add(fn);
        }
        return { shoulderGrp, upperGrp, elbowGrp };
    }
    const lArm = makeArm(1);   // character's left
    const rArm = makeArm(-1);  // character's right

    // ── NECK + HEAD ───────────────────────────────────────
    const neckGrp = new THREE.Group(); neckGrp.position.y = 0.338; torsoGrp.add(neckGrp);
    const neckMesh = mk(cyl(0.097, 0.104, 0.20, 12), MAT.skin); neckGrp.add(neckMesh);

    const headGrp = new THREE.Group(); headGrp.position.y = 0.22; neckGrp.add(headGrp);

    // Head (anime: slightly wider at cheeks, small pointed chin)
    const headMesh = mk(sph(0.315, 32, 32), MAT.skin); headMesh.scale.set(1.02, 1.10, 0.93); headGrp.add(headMesh);
    const chinMesh = mk(sph(0.27, 24, 24), MAT.skin); chinMesh.scale.set(0.80, 0.50, 0.75); chinMesh.position.y = -0.218; headGrp.add(chinMesh);

    // ── HAIR ──────────────────────────────────────────────
    const hairGrp = new THREE.Group(); headGrp.add(hairGrp);

    // Full hair cap
    const hairCap = mk(sph(0.342, 32, 32), MAT.hair); hairCap.scale.set(1.04, 1.07, 1.04); hairCap.position.y = 0.04; hairGrp.add(hairCap);

    // Back hair (long flowing volume)
    const backH = mk(sph(0.285, 20, 20), MAT.hair); backH.scale.set(1.1, 2.45, 0.78); backH.position.set(0, -0.30, -0.16); hairGrp.add(backH);
    [-0.16, 0, 0.16].forEach((x, i) => {
        const s = mk(sph(0.125, 12, 12), MAT.hair); s.scale.set(0.56, 1.9 + i * 0.18, 0.5); s.position.set(x, -0.56, -0.13); hairGrp.add(s);
    });

    // Side hair (fall past shoulders)
    const sHL = mk(sph(0.205, 16, 16), MAT.hair); sHL.scale.set(0.62, 2.1, 0.74); sHL.position.set(-0.315, -0.19, 0.02); hairGrp.add(sHL);
    const sHR = mk(sph(0.205, 16, 16), MAT.hair); sHR.scale.set(0.62, 2.1, 0.74); sHR.position.set( 0.315, -0.19, 0.02); hairGrp.add(sHR);

    // Front bangs (fan of 6 pieces)
    [
        { x: -0.225, y: 0.09, z: 0.265, rz:  0.32, sy: 0.62 },
        { x: -0.115, y: 0.12, z: 0.285, rz:  0.13, sy: 0.68 },
        { x: -0.015, y: 0.135,z: 0.297, rz:  0.0,  sy: 0.72 },
        { x:  0.09,  y: 0.12, z: 0.285, rz: -0.13, sy: 0.68 },
        { x:  0.195, y: 0.09, z: 0.265, rz: -0.28, sy: 0.62 },
    ].forEach(b => {
        const bang = mk(sph(0.158, 16, 16), MAT.hair);
        bang.scale.set(0.53, b.sy, 0.53); bang.position.set(b.x, b.y, b.z); bang.rotation.z = b.rz;
        hairGrp.add(bang);
    });

    // Highlight streak
    const hi = mk(sph(0.14, 12, 12), MAT.hairHi); hi.scale.set(0.4, 1.15, 0.6); hi.position.set(0.1, 0.15, 0.22); hairGrp.add(hi);

    // ── CAT EARS ──────────────────────────────────────────
    // Positioned at the upper-sides of the hair, angling outward — anime cat ear style
    [-1, 1].forEach(side => {
        const eg = new THREE.Group();
        eg.position.set(side * 0.218, 0.378, 0.04);
        eg.rotation.set(-0.06, side * 0.05, side * -0.24);
        hairGrp.add(eg);

        const outer = mk(cone(0.112, 0.255, 8), MAT.hair); eg.add(outer);
        const inner = mk(cone(0.060, 0.168, 8), MAT.earIn); inner.position.y = 0.008; eg.add(inner);
        const tip   = mk(sph(0.050, 12, 10), MAT.fur);      tip.position.y = 0.126; eg.add(tip);
    });

    // ── EYES ──────────────────────────────────────────────
    const eyeGrps = [-1, 1].map(side => {
        const eg = new THREE.Group();
        eg.position.set(side * 0.100, 0.048, 0.308);  // pushed clear of sphere surface
        eg.renderOrder = 2;
        headGrp.add(eg);

        // Iris (large, dark maroon/red — anime style)
        const iris = new THREE.Mesh(circ(0.082, 24), MAT.eye); iris.scale.set(1, 1.25, 1); iris.renderOrder = 2; eg.add(iris);
        // Pupil
        const pu = new THREE.Mesh(circ(0.035, 16), MAT.pupil); pu.position.z = 0.001; pu.renderOrder = 3; eg.add(pu);
        // Main shine
        const sh1 = new THREE.Mesh(circ(0.027, 12), MAT.eyeWh); sh1.position.set(0.026, 0.034, 0.002); sh1.renderOrder = 4; eg.add(sh1);
        // Small shine
        const sh2 = new THREE.Mesh(circ(0.015, 10), MAT.eyeWh); sh2.position.set(-0.020, -0.028, 0.002); sh2.renderOrder = 4; eg.add(sh2);
        // Upper lash lid — thin strip at iris top edge
        const lb = new THREE.Mesh(box(0.178, 0.016, 0.001), MAT.lash); lb.position.y = 0.098; lb.renderOrder = 3; eg.add(lb);
        // Lash side flick
        const lf = new THREE.Mesh(box(0.030, 0.016, 0.001), MAT.lash); lf.position.set(-side * 0.090, 0.082, 0); lf.rotation.z = side * 0.50; lf.renderOrder = 3; eg.add(lf);

        return eg;
    });

    // Eyebrows — thin, slightly arched
    [-1, 1].forEach(side => {
        const br = new THREE.Mesh(box(0.110, 0.015, 0.001), MAT.brow);
        br.position.set(side * 0.100, 0.172, 0.305); br.rotation.z = side * -0.22;
        br.renderOrder = 2;
        headGrp.add(br);
    });

    // Nose
    const noseMesh = new THREE.Mesh(box(0.03, 0.013, 0.001), MAT.nose);
    noseMesh.position.set(0, -0.028, 0.312); noseMesh.renderOrder = 2; headGrp.add(noseMesh);

    // Mouth (open — surprised/talking)
    const mouthGrp = new THREE.Group(); mouthGrp.position.set(0, -0.114, 0.308); mouthGrp.renderOrder = 2; headGrp.add(mouthGrp);
    const mOuter = new THREE.Mesh(circ(0.046, 18), MAT.lip);  mOuter.scale.set(1.52, 0.72, 1); mOuter.renderOrder = 2; mouthGrp.add(mOuter);
    const mTeeth = new THREE.Mesh(box(0.075, 0.025, 0.001), MAT.teeth); mTeeth.position.set(0, 0.009, 0.001); mTeeth.renderOrder = 3; mouthGrp.add(mTeeth);

    // Blush — subtle cheek tint
    [-1, 1].forEach(side => {
        const bl = new THREE.Mesh(circ(0.052, 18), MAT.blush);
        bl.position.set(side * 0.168, -0.042, 0.294); bl.renderOrder = 2; headGrp.add(bl);
    });

    // ── SKIRT ─────────────────────────────────────────────
    const skirtGrp = new THREE.Group(); skirtGrp.position.y = -0.2; hipsGrp.add(skirtGrp);

    const skirtMesh = mk(new THREE.ConeGeometry(0.44, 0.50, 24, 4, true), MAT.skirt); skirtGrp.add(skirtMesh);
    const waistband = mk(cyl(0.272, 0.272, 0.048, 18), MAT.vestDk); waistband.position.y = 0.25; skirtGrp.add(waistband);

    // Pleat ridges
    for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        const pl = mk(box(0.02, 0.46, 0.016), MAT.vestDk);
        pl.position.set(Math.sin(a) * 0.36, 0, Math.cos(a) * 0.36); pl.rotation.y = -a;
        skirtGrp.add(pl);
    }

    // ── LEGS ──────────────────────────────────────────────
    function makeLeg(side) {
        const hipG = new THREE.Group(); hipG.position.set(side * 0.122, -0.235, 0); hipsGrp.add(hipG);

        const upperG = new THREE.Group(); hipG.add(upperG);
        const uMesh = mk(cyl(0.108, 0.096, 0.50, 12), MAT.skin); uMesh.position.y = -0.25; upperG.add(uMesh);

        const kneeG = new THREE.Group(); kneeG.position.y = -0.50; upperG.add(kneeG);
        const lMesh = mk(cyl(0.094, 0.077, 0.47, 12), MAT.skin); lMesh.position.y = -0.235; kneeG.add(lMesh);

        // Sock
        const sockMesh = mk(cyl(0.08, 0.072, 0.23, 12), MAT.sock); sockMesh.position.y = -0.395; kneeG.add(sockMesh);

        const ankleG = new THREE.Group(); ankleG.position.y = -0.47; kneeG.add(ankleG);
        // Shoe body
        const shoe = mk(box(0.102, 0.078, 0.225), MAT.shoe); shoe.position.set(0, -0.031, 0.033); ankleG.add(shoe);
        // Toe cap
        const toe = mk(sph(0.058, 10, 8), MAT.shoe); toe.scale.set(0.86, 0.7, 1.1); toe.position.set(0, -0.022, 0.125); ankleG.add(toe);

        return { hipG, upperG, kneeG, ankleG };
    }
    const lLeg = makeLeg(1);   // character's left
    const rLeg = makeLeg(-1);  // character's right

    // ═══════════════════════════════════════════════════════
    //  INTERACTION STATE
    // ═══════════════════════════════════════════════════════
    let mouseNX = 0, mouseNY = 0;
    let curHeadY = 0, curHeadX = 0;
    let tgtHeadY = 0, tgtHeadX = 0;
    let isWaving = false, waveT = 0;
    let camZ = 4.0, tgtCamZ = 4.0;

    window.addEventListener('mousemove', e => {
        mouseNX = (e.clientX / innerWidth  - 0.5) * 2;
        mouseNY = (e.clientY / innerHeight - 0.5) * 2;
        tgtHeadY =  mouseNX * 0.55;
        tgtHeadX = -mouseNY * 0.28;
    });
    window.addEventListener('click', () => { if (!isWaving) { isWaving = true; waveT = 0; } });
    window.addEventListener('wheel', e => { tgtCamZ = Math.max(2.4, Math.min(7.5, tgtCamZ + e.deltaY * 0.004)); });

    // ═══════════════════════════════════════════════════════
    //  ANIMATION LOOP
    // ═══════════════════════════════════════════════════════
    const clock = new THREE.Clock();
    const lerp  = (a, b, t) => a + (b - a) * t;
    const clamp = (x, lo, hi) => Math.max(lo, Math.min(hi, x));

    function animate() {
        requestAnimationFrame(animate);

        const now = clock.getElapsedTime();
        const dt  = Math.min(now - (animate._prev || 0), 0.05);
        animate._prev = now;

        // Running phase (2.5 Hz = ~5 steps/sec realistic run)
        const freq = 2.5;
        const p = now * freq * Math.PI * 2;

        // ── Legs ──────────────────────────────────────────
        lLeg.upperG.rotation.x  =  Math.sin(p)           * 0.65;
        rLeg.upperG.rotation.x  =  Math.sin(p + Math.PI) * 0.65;
        lLeg.kneeG.rotation.x   = clamp(-Math.sin(p - 0.45) * 0.78, 0, 1.15);
        rLeg.kneeG.rotation.x   = clamp(-Math.sin(p + Math.PI - 0.45) * 0.78, 0, 1.15);
        lLeg.ankleG.rotation.x  =  Math.sin(p)           * 0.22 - 0.06;
        rLeg.ankleG.rotation.x  =  Math.sin(p + Math.PI) * 0.22 - 0.06;

        // ── Arms ──────────────────────────────────────────
        if (!isWaving) {
            lArm.upperGrp.rotation.x = Math.sin(p + Math.PI) * 0.52;
            lArm.upperGrp.rotation.z = 0.12;
            lArm.elbowGrp.rotation.x = clamp(Math.sin(p + Math.PI) * 0.32, 0, 0.55);
        } else {
            waveT += dt;
            lArm.upperGrp.rotation.x = -1.1 - Math.sin(waveT * 3) * 0.12;
            lArm.upperGrp.rotation.z =  0.32;
            lArm.elbowGrp.rotation.x = -0.42 + Math.sin(waveT * 7) * 0.52;
            if (waveT > 2.3) { isWaving = false; lArm.upperGrp.rotation.z = 0.12; }
        }
        rArm.upperGrp.rotation.x = Math.sin(p) * 0.52;
        rArm.upperGrp.rotation.z = -0.12;
        rArm.elbowGrp.rotation.x = clamp(Math.sin(p) * 0.32, 0, 0.55);

        // ── Body bob & sway ───────────────────────────────
        hipsGrp.position.y = 0.96 + Math.abs(Math.sin(p)) * 0.042;
        hipsGrp.rotation.z = Math.sin(p) * 0.024;

        // Torso lean + side tilt
        torsoGrp.rotation.x = 0.062;
        torsoGrp.rotation.z = Math.sin(p) * 0.020;

        // Skirt physics
        skirtGrp.rotation.x = -0.04 + Math.sin(p * 2) * 0.026;
        skirtGrp.rotation.z = Math.sin(p) * 0.030;

        // Hair secondary motion (slight lag)
        hairGrp.rotation.x = Math.sin(p * 0.8 + 0.4) * 0.034 - 0.014;
        hairGrp.rotation.z = Math.sin(p * 0.6) * 0.017;

        // ── Head tracking ─────────────────────────────────
        curHeadY = lerp(curHeadY, tgtHeadY, 0.07);
        curHeadX = lerp(curHeadX, tgtHeadX, 0.07);
        headGrp.rotation.y = curHeadY;
        headGrp.rotation.x = clamp(curHeadX, -0.26, 0.26) + 0.022;

        // Eye micro-track (follows head slightly further)
        eyeGrps.forEach(eg => { eg.rotation.y = curHeadY * 0.12; });

        // ── Camera zoom ───────────────────────────────────
        camZ = lerp(camZ, tgtCamZ, 0.08);
        camera.position.z = camZ;

        renderer.render(scene, camera);
    }
    animate();

    // ═══════════════════════════════════════════════════════
    //  RESIZE
    // ═══════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
