<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codify Vibeathon 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2dff, #ff2d7b, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 4s ease infinite;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .subtitle {
            margin-top: 1rem;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid rgba(123, 45, 255, 0.15);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        .pulse-ring:nth-child(2) { animation-delay: 1s; width: 400px; height: 400px; }
        .pulse-ring:nth-child(3) { animation-delay: 2s; width: 500px; height: 500px; }

        .badge {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 999px;
            color: #00f0ff;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            background: rgba(0, 240, 255, 0.05);
            animation: fadeUp 1s ease 0.5s both;
        }

        .badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00f0ff;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* == Pink Cat-Girl == */
        #anime-girl-wrapper {
            position: fixed;
            bottom: 0;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        #speech-bubble {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            background: rgba(10, 10, 20, 0.92);
            border: 1.5px solid rgba(255, 150, 220, 0.7);
            border-radius: 16px;
            padding: 10px 16px;
            color: #ffcef3;
            font-size: 0.85rem;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 0 18px rgba(255, 100, 200, 0.35), 0 0 6px rgba(255, 100, 200, 0.2) inset;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #speech-bubble.visible {
            transform: translateX(-50%) scale(1);
        }
        #speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: rgba(255, 150, 220, 0.7);
            border-bottom: 0;
        }

        #anime-svg {
            width: 170px;
            height: auto;
            filter: drop-shadow(0 0 18px rgba(255, 100, 220, 0.55)) drop-shadow(0 0 6px rgba(123, 45, 255, 0.4));
            animation: girlBob 3s ease-in-out infinite;
            transition: filter 0.2s ease, transform 0.15s ease;
        }
        #anime-svg:hover {
            filter: drop-shadow(0 0 28px rgba(255, 100, 220, 0.9)) drop-shadow(0 0 10px rgba(0, 240, 255, 0.5));
            transform: scale(1.04);
        }
        #anime-svg.clicked {
            animation: girlJump 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, girlBob 3s ease-in-out 0.45s infinite;
        }

        /* eye blink */
        .eye-blink { animation: eyeBlink 4s ease-in-out infinite; }
        .eye-blink.right { animation-delay: 0.07s; }

        /* blush pulses */
        .blush { animation: blushPulse 2.5s ease-in-out infinite; }

        /* hair shimmer */
        .hair-shine { animation: hairShine 3s ease-in-out infinite; }

        /* sparkles */
        .sparkle { animation: sparkleTwinkle 2s ease-in-out infinite; }
        .sparkle:nth-child(2) { animation-delay: 0.4s; }
        .sparkle:nth-child(3) { animation-delay: 0.8s; }

        /* == Cat ear wiggle == */
        #left-ear  { transform-origin: 52px 60px; }
        #right-ear { transform-origin: 108px 60px; }

        #left-ear.ear-wiggle  { animation: leftEarWiggle  0.6s ease-in-out; }
        #right-ear.ear-wiggle { animation: rightEarWiggle 0.6s ease-in-out 0.05s; }

        @keyframes leftEarWiggle {
            0%, 100% { transform: rotate(0deg); }
            20%       { transform: rotate(-14deg); }
            50%       { transform: rotate(9deg); }
            75%       { transform: rotate(-5deg); }
        }
        @keyframes rightEarWiggle {
            0%, 100% { transform: rotate(0deg); }
            20%       { transform: rotate(14deg); }
            50%       { transform: rotate(-9deg); }
            75%       { transform: rotate(5deg); }
        }

        #pet-zone { cursor: pointer; }

        @keyframes girlBob {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }
        @keyframes girlJump {
            0%   { transform: translateY(0px) scale(1); }
            40%  { transform: translateY(-30px) scale(1.06); }
            100% { transform: translateY(0px) scale(1); }
        }
        @keyframes eyeBlink {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.08); }
        }
        @keyframes blushPulse {
            0%, 100% { opacity: 0.55; }
            50%       { opacity: 0.9; }
        }
        @keyframes hairShine {
            0%, 100% { opacity: 0.25; }
            50%       { opacity: 0.55; }
        }
        @keyframes sparkleTwinkle {
            0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
            50%       { opacity: 1;  transform: scale(1)   rotate(180deg); }
        }
    </style>
</head>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(123, 45, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = Array.from({ length: 80 }, () => new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${0.08 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
        animate();

            ];

            const clickMessages = [
                'Konnichiwa! (\uff89\u25d5\u30ef\u25d5)\uff89*:\uff65\uff9f\u2727',
                'Kawaii desu ne~ \u2661',
                'Ganbare! You can do it! \u2728',
                'Sugoi! You clicked me! (*\u2265\u03c9\u2264)',
                'Eeeh?! Again?! (\ua708\u1d17\ua708)',
                'Moe moe kyun~ \u2665',
                'Nani?! (\uff9f\u0414\uff9f)\uff89',
                'Hai hai~ \u0669(\u25d5\u203f\u25d5\uff61)\u06f6',
                'Keep coding, senpai~ (\u3065\uff61\u25d5\u203f\u203f\u25d5\uff61)\u3065',
            ];

            const happyMouth     = 'M70,117 Q80,128 90,117';
            const surprisedMouth = 'M73,115 Q80,125 87,115';
            const petMouth       = 'M68,116 Q80,130 92,116';

            let petIdx = 0, clickIdx = 0;
            let bubbleTimer = null, earTimer = null;
            let hintShown = false;

            function showBubble(text, ms) {
                clearTimeout(bubbleTimer);
                bubble.textContent = text;
                bubble.classList.add('visible');
                bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), ms || 2800);
            }

            function wiggleEars() {
                leftEar.classList.remove('ear-wiggle');
                rightEar.classList.remove('ear-wiggle');
                void leftEar.offsetWidth;
                leftEar.classList.add('ear-wiggle');
                rightEar.classList.add('ear-wiggle');
                clearTimeout(earTimer);
                earTimer = setTimeout(() => {
                    leftEar.classList.remove('ear-wiggle');
                    rightEar.classList.remove('ear-wiggle');
                }, 700);
            }

            function triggerPet() {
                showBubble(petMessages[petIdx++ % petMessages.length], 3000);
                wiggleEars();
                mouth.setAttribute('d', petMouth);
                setTimeout(() => mouth.setAttribute('d', happyMouth), 800);
                spawnParticle();
            }

            function triggerClick() {
                showBubble(clickMessages[clickIdx++ % clickMessages.length], 3000);
                svg.classList.remove('clicked');
                void svg.offsetWidth;
                svg.classList.add('clicked');
                mouth.setAttribute('d', surprisedMouth);
                setTimeout(() => mouth.setAttribute('d', happyMouth), 600);
                spawnParticle();
            }

            petZone.addEventListener('click', (e) => { e.stopPropagation(); triggerPet(); });
            wrapper.addEventListener('click', (e) => { if (e.target !== petZone) triggerClick(); });

            wrapper.addEventListener('mouseenter', () => {
                if (!hintShown) {
                    showBubble('Pat my ears! \u2728', 2200);
                    hintShown = true;
                }
            });

            let hoverThrottle = false;
            petZone.addEventListener('mousemove', () => {
                if (hoverThrottle) return;
                hoverThrottle = true;
                wiggleEars();
                setTimeout(() => { hoverThrottle = false; }, 700);
            });

            const symbols = ['\u2665', '\u273f', '\u2727', '\u2605', '\u266a', '\ud83d\udc3e'];
            function spawnParticle() {
                const rect = wrapper.getBoundingClientRect();
                const el = document.createElement('div');
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.cssText =
                    'position:fixed;left:' + (rect.left + rect.width / 2 - 10) + 'px;' +
                    'bottom:' + (window.innerHeight - rect.top + 10) + 'px;' +
                    'font-size:1.4rem;color:hsl(' + (Math.random() * 60 + 300) + ',100%,75%);' +
                    'pointer-events:none;z-index:999;animation:heartFloat 1.2s ease-out forwards;';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1300);
            }

            const ks = document.createElement('style');
            ks.textContent = '@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}';
            document.head.appendChild(ks);
        })();
    </script>
</body>
</html>
