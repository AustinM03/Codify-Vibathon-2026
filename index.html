<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codify Vibeathon 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff, #7b2dff, #ff2d7b, #00f0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 4s ease infinite;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .subtitle {
            margin-top: 1rem;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid rgba(123, 45, 255, 0.15);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        .pulse-ring:nth-child(2) { animation-delay: 1s; width: 400px; height: 400px; }
        .pulse-ring:nth-child(3) { animation-delay: 2s; width: 500px; height: 500px; }

        .badge {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 999px;
            color: #00f0ff;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            background: rgba(0, 240, 255, 0.05);
            animation: fadeUp 1s ease 0.5s both;
        }

        .chat-link {
            display: inline-block;
            margin-top: 1.2rem;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: color 0.2s;
            position: relative;
            z-index: 10;
        }
        .chat-link:hover { color: #00f0ff; }

        .badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00f0ff;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>

    <div class="container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <h1>Hello, World.</h1>
        <p class="subtitle">Codify Vibeathon 2026 &mdash; Springfield, MO</p>
        <div class="badge">System Online</div>
        <a href="/chat.html" class="chat-link">Try the Chat →</a>
        <a href="/anime-girl.html" class="chat-link">Meet Sakura →</a>
    </div>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(123, 45, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = Array.from({ length: 80 }, () => new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${0.08 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
        animate();
    </script>
</body>
</html>
